<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitung Umur - Desa Slendro</title>

<style>
body{
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#0d6efd,#198754);
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:420px;
}

/* ===== BANNER ===== */
.banner{
    position:relative;
    border-radius:20px 20px 0 0;
    overflow:hidden;
}

.banner img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

/* ===== CARD ===== */
.card{
    background:white;
    padding:90px 25px 25px;
    border-radius:0 0 20px 20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
    position:relative;
}

/* ===== LOGO ===== */
.logo{
    width:200px;              /* diperbesar */
    position:absolute;
    top:-110px;               /* sedikit memotong banner */
    left:50%;
    transform:translateX(-50%);
}

/* ===== TEXT ===== */
h2{
    margin-top:10px;
}

.subtitle{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

label{
    font-size:14px;
    font-weight:bold;
    display:block;
    text-align:left;
    margin-top:12px;
}

input,button{
    padding:11px;
    margin-top:6px;
    width:100%;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    background:linear-gradient(45deg,#0d6efd,#198754);
    color:white;
    border:none;
    cursor:pointer;
    margin-top:18px;
    font-weight:bold;
}

.result{
    margin-top:20px;
    font-weight:bold;
    font-size:16px;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#999;
}

/* ===== RUNNING TEXT TANPA SHAPE ===== */
.running-profile{
    margin-top:25px;
    overflow:hidden;
    white-space:nowrap;
}

.marquee{
    display:inline-flex;
    align-items:center;
    gap:15px;
    animation:jalan 18s linear infinite;
}

/* pause saat disentuh / hover */
.running-profile:hover .marquee,
.running-profile:active .marquee{
    animation-play-state:paused;
}

.foto-bulat{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
}

.running-text{
    white-space:nowrap;
}

/* langsung muncul tanpa jeda */
@keyframes jalan{
    0%   { transform:translateX(0%); }
    100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<div class="container">

    <div class="banner">
        <img src="banner_desa.jpg" alt="Banner Desa">
    </div>

    <div class="card">

        <!-- Logo -->
        <img src="logo_desa_slendro.png" class="logo" alt="Logo Desa">

        <h2>Kalkulator Umur</h2>
        <div class="subtitle">Pemerintah Desa Slendro</div>

        <label>Tanggal Lahir</label>
        <input type="date" id="tglLahir">

        <label>Tanggal Hitung (Opsional)</label>
        <input type="date" id="tglTarget">

        <button onclick="hitungUmur()">Hitung Umur</button>

        <div class="result" id="hasil"></div>

        <!-- Running Text -->
        <div class="running-profile">
            <div class="marquee">
                <img src="foto_saya.jpg" class="foto-bulat">
                <div class="running-text">
                    👋 Selamat datang di Website Resmi Desa Slendro. Pemerintah Desa siap melayani masyarakat dengan sepenuh hati.
                </div>
            </div>
        </div>

        <div class="footer">© 2026 Desa Slendro</div>

    </div>
</div>

<script>
function hitungUmur(){
    const lahirVal=document.getElementById("tglLahir").value;
    const targetVal=document.getElementById("tglTarget").value;
    const hasil=document.getElementById("hasil");

    if(!lahirVal){
        hasil.innerHTML="Silakan pilih tanggal lahir.";
        return;
    }

    const tglLahir=new Date(lahirVal);
    const tanggalAcuan=targetVal?new Date(targetVal):new Date();

    if(tglLahir>tanggalAcuan){
        hasil.innerHTML="Tanggal lahir tidak boleh lebih dari tanggal hitung.";
        return;
    }

    let tahun=tanggalAcuan.getFullYear()-tglLahir.getFullYear();
    let bulan=tanggalAcuan.getMonth()-tglLahir.getMonth();
    let hari=tanggalAcuan.getDate()-tglLahir.getDate();

    if(hari<0){
        bulan--;
        const bulanSebelumnya=new Date(tanggalAcuan.getFullYear(),tanggalAcuan.getMonth(),0);
        hari+=bulanSebelumnya.getDate();
    }

    if(bulan<0){
        tahun--;
        bulan+=12;
    }

    const formatIndonesia=tanggalAcuan.toLocaleDateString("id-ID",{
        weekday:"long",
        day:"2-digit",
        month:"long",
        year:"numeric"
    });

    hasil.innerHTML=
        "Umur pada "+formatIndonesia+" :<br>"+
        tahun+" Tahun, "+
        bulan+" Bulan, "+
        hari+" Hari";
}
</script>

</body>
</html>
