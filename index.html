<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitung Umur - Desa Slendro</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0d6efd,#198754);
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:420px;
}

/* ===== BANNER ===== */
.banner{
    position:relative;
    border-radius:20px 20px 0 0;
    overflow:hidden;
}

.banner img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

/* ===== LOGO SETENGAH MENIMPA ===== */
.logo-wrapper{
    position:relative;
    height:0;
}

.logo{
    width:180px;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:-90px; /* separuh ke banner, separuh ke card */
    background:white;
    padding:12px;
    border-radius:50%;
    box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

/* ===== CARD ===== */
.card{
    background:white;
    padding:120px 25px 25px;
    border-radius:0 0 20px 20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
}

h2{
    margin:10px 0 5px;
}

.subtitle{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

label{
    font-size:14px;
    font-weight:bold;
    display:block;
    text-align:left;
    margin-top:12px;
}

input,button{
    padding:11px;
    margin-top:6px;
    width:100%;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    background:linear-gradient(45deg,#0d6efd,#198754);
    color:white;
    border:none;
    cursor:pointer;
    margin-top:18px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:20px;
    font-weight:bold;
    font-size:16px;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#999;
}

/* ===== RUNNING PROFILE ===== */
.running-profile{
    margin-top:25px;
    padding:14px;
    border-radius:15px;
    background:linear-gradient(45deg,rgba(13,110,253,0.15),rgba(25,135,84,0.15));
    overflow:hidden;
    position:relative;
}

/* area pause */
.marquee-container{
    overflow:hidden;
    white-space:nowrap;
    position:relative;
}

/* konten berjalan */
.marquee-track{
    display:inline-flex;
    align-items:center;
    gap:15px;
    animation:marquee 22s linear infinite;
}

/* pause saat disentuh / hover */
.marquee-container:hover .marquee-track,
.marquee-container:active .marquee-track{
    animation-play-state:paused;
}

.foto-bulat{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #0d6efd;
    flex-shrink:0;
}

.running-text{
    white-space:nowrap;
    font-weight:500;
}

/* animasi dari kanan full ke kiri full */
@keyframes marquee{
    0%   { transform:translateX(100%); }
    100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<div class="container">

    <!-- Banner -->
    <div class="banner">
        <img src="banner_desa.jpg" alt="Banner Desa">
    </div>

    <!-- Logo -->
    <div class="logo-wrapper">
        <img src="logo_desa_slendro.png" class="logo" alt="Logo Desa">
    </div>

    <!-- Card -->
    <div class="card">

        <h2>Kalkulator Umur</h2>
        <div class="subtitle">Pemerintah Desa Slendro</div>

        <label>Tanggal Lahir</label>
        <input type="date" id="tglLahir">

        <label>Tanggal Hitung (Opsional)</label>
        <input type="date" id="tglTarget">

        <button onclick="hitungUmur()">Hitung Umur</button>

        <div class="result" id="hasil"></div>

        <!-- Running Profile -->
        <div class="running-profile">
            <div class="marquee-container">
                <div class="marquee-track">
                    <img src="foto_saya.jpg" class="foto-bulat">
                    <div class="running-text">
                        👋 Selamat datang di Website Resmi Desa Slendro. Pemerintah Desa siap melayani masyarakat dengan sepenuh hati.
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">© 2026 Desa Slendro</div>

    </div>
</div>

<script>
function hitungUmur(){
    const lahirVal=document.getElementById("tglLahir").value;
    const targetVal=document.getElementById("tglTarget").value;
    const hasil=document.getElementById("hasil");

    if(!lahirVal){
        hasil.innerHTML="Silakan pilih tanggal lahir.";
        return;
    }

    const tglLahir=new Date(lahirVal);
    const tanggalAcuan=targetVal?new Date(targetVal):new Date();

    if(tglLahir>tanggalAcuan){
        hasil.innerHTML="Tanggal lahir tidak boleh lebih dari tanggal hitung.";
        return;
    }

    let tahun=tanggalAcuan.getFullYear()-tglLahir.getFullYear();
    let bulan=tanggalAcuan.getMonth()-tglLahir.getMonth();
    let hari=tanggalAcuan.getDate()-tglLahir.getDate();

    if(hari<0){
        bulan--;
        const bulanSebelumnya=new Date(tanggalAcuan.getFullYear(),tanggalAcuan.getMonth(),0);
        hari+=bulanSebelumnya.getDate();
    }

    if(bulan<0){
        tahun--;
        bulan+=12;
    }

    const formatIndonesia=tanggalAcuan.toLocaleDateString("id-ID",{
        weekday:"long",
        day:"2-digit",
        month:"long",
        year:"numeric"
    });

    hasil.innerHTML=
        "Umur pada "+formatIndonesia+" :<br>"+
        tahun+" Tahun, "+
        bulan+" Bulan, "+
        hari+" Hari";
}
</script>

</body>
</html>
